name: Deploy to Production

# Runs on every push to main, and can also be triggered manually
# from the GitHub "Actions" tab (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent two deploys running at the same time
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # SSH port (defaults to 22 if the secret is not set)
          port: ${{ secrets.SERVER_PORT || 22 }}
          # Runs the deploy script that lives on the server as root.
          # See scripts/deploy.sh for the exact commands it should contain.
          script: sudo /usr/local/bin/decohub-deploy.sh
